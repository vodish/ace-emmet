<!DOCTYPE html>
<html>
<head>
<title>ACE Content Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style type="text/css" media="screen">
    .flex {
      height: 30vh;
      margin-top: 1em;
      display: flex;
      gap: 2em;
    }
    .flex #edt {
        width: 50%;
    }
    
    .debug {
        font-family: monospace;
    }
    /* .ace_editor .ace_invisible {
        opacity: 0;
    } */
</style>
</head>
<body>


<div class="flex">
    <div id="edt"></div>
    <div class="debug">
        <div>cells</div>
        <pre id="cells"></pre>
    </div>
    <div class="debug">
        <div>cache</div>
        <pre id="cache"></pre>
    </div>
</div>


    
<script src="i/ace/ace.js"></script>
<script src="i/ace/mode-html.js"></script>
<script src="i/ace/mode-yaml.js"></script>
<script src="i/ace/emmet-cut.js?13"></script>
<script src="i/ace/ext-emmet.js?13"></script>
<script>

var editor = ace.edit("edt");
editor.setOption("fontSize", "16px");
editor.session.setOption("useWorker", false);
editor.session.setMode("ace/mode/html");
editor.setOption("showInvisibles", false);
// или альтернативный метод
editor.setShowInvisibles(false);

// Устанавливаем очищенный текст обратно
// editor.setValue(cleanedValue, -1); // -1 сохраняет позицию курсора

editor.setValue('one\u200B\ntwo\u200C');

function prev(el, dx) {
  if (('prev' in el)) return
  el.prev = dx
}


function updateids() {
    // источник
    // console.log(editor.renderer.$textLayer.$lines);    
    var cells = editor.renderer.$textLayer.$lines.cells;
    var cache = editor.renderer.$textLayer.$lines.cellCache;

    // добавить nid
    cells.map((c, dx) => prev(c.element, dx))
    cache.map((c, dx) => prev(c.element, dx))
    

    // отладка
    const jsonMap = (c, idx) => ({idx, cont: c.element.textContent, prev: c.element.prev});
    document.getElementById('cells').innerHTML = JSON.stringify(cells.map(jsonMap), null, 2)
    document.getElementById('cache').innerHTML = JSON.stringify(cache.map(jsonMap), null, 2)

    
    // Заменяем невидимые символы на их кодовые обозначения
    // var replaced = line
    //     .replace(/\u200B/g, '[U+200B]') // Zero Width Space
    //     .replace(/\u200C/g, '[U+200C]') // Zero Width Non‑Joiner

}

// обновлять при изменении
// editor.on('change', updateids);
// обновить после рендера
editor.renderer.on("afterRender", updateids);


// initial update
// updateids();
</script>
</body>
</html>
