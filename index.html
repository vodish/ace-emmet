<!DOCTYPE html>
<html>
<head>
<title>ACE Content Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style type="text/css" media="screen">
    .flex {
      height: 30vh;
      margin-top: 1em;
      display: flex;
    }
    .flex #edt {
        width: 50%;
    }
    .flex #ids {
        width: 50%;
        border: solid 1px red;
        overflow: auto;
        font-family: monospace;
        font-size: 10px;
    }
    #ids div {
        border-bottom: 1px dotted #ccc;
        padding: 2px 4px;
        position: relative;
    }
    
    .debug {
        font-family: monospace;
        font-size: 8px;
        gap: 2rem;
    }
    .controls {
        margin: 10px;
        padding: 10px;
        border: 1px solid #ccc;
    }
</style>
</head>
<body>


<div class="flex">
    <div id="edt"></div>
    <div id="ids"></div>
</div>

<div class="flex debug">
    <div>
        <div>cells</div>
        <pre id="cells"></pre>
    </div>
    <div>
        <div>cellCache</div>
        <pre id="cellCache"></pre>
    </div>
</div>

    
<script src="i/ace/ace.js"></script>
<script src="i/ace/mode-html.js"></script>
<script src="i/ace/mode-yaml.js"></script>
<script src="i/ace/emmet-cut.js?13"></script>
<script src="i/ace/ext-emmet.js?13"></script>
<script>
// Стор для управления уникальными ID строк
var LineIdStore = (function() {
    function LineIdStore() {
        this.rowToId = new Map();       // row -> id (основной маппинг: ID следует за позицией row)
        this.idToText = new Map();      // id -> текущий текст
        this.nextId = 0;                // следующий доступный ID
    }
    
    // Получить или создать ID для строки с данным row
    LineIdStore.prototype.getIdForRow = function(row, text) {
        // Если для этого row уже есть ID, возвращаем его (текст может измениться, ID остаётся)
        if (this.rowToId.has(row)) {
            var existingId = this.rowToId.get(row);
            // Обновляем текст для этого ID
            this.idToText.set(existingId, text);
            return existingId;
        }
        // Новый row - создаём новый ID
        var newId = this.nextId++;
        this.rowToId.set(row, newId);
        this.idToText.set(newId, text);
        return newId;
    };
    
    // Получить ID для row
    LineIdStore.prototype.getIdForRowOnly = function(row) {
        return this.rowToId.get(row);
    };
    
    // Получить текст для ID
    LineIdStore.prototype.getTextForId = function(id) {
        return this.idToText.get(id);
    };
    
    // Обработать перемещение строк (сдвиг row)
    // Вызывается когда нужно обновить все маппинги после изменений
    LineIdStore.prototype.syncRows = function(rowsWithData) {
        // rowsWithData: массив объектов {row, text}
        var newRowToId = new Map();
        
        for (var i = 0; i < rowsWithData.length; i++) {
            var item = rowsWithData[i];
            var row = item.row;
            var text = item.text;
            
            // Проверяем, был ли уже ID для этого текста на старом row
            var foundId = null;
            this.rowToId.forEach(function(id, oldRow) {
                if (this.idToText.get(id) === text && foundId === null) {
                    foundId = id;
                }
            }, this);
            
            if (foundId !== null) {
                // Текст найден - сохраняем его ID и привязываем к новому row
                newRowToId.set(row, foundId);
                this.idToText.set(foundId, text);
            } else {
                // Новый текст - создаём новый ID
                var newId = this.nextId++;
                newRowToId.set(row, newId);
                this.idToText.set(newId, text);
            }
        }
        
        this.rowToId = newRowToId;
    };
    
    // Сбросить все данные
    LineIdStore.prototype.reset = function() {
        this.rowToId.clear();
        this.idToText.clear();
        this.nextId = 0;
    };
    
    return LineIdStore;
})();

var editor = ace.edit("edt");
editor.session.setOption("useWorker", false);
editor.session.setMode("ace/mode/html");
editor.setValue('one\ntwo\n');

// Инициализируем стор
var lineIdStore = new LineIdStore();

function updateids() {
    // источник
    var lines = editor.renderer.$textLayer.$lines;
    console.log('cells:', lines.cells);
    
    // Собираем данные о всех строках: row и текст
    var rowsData = lines.cells.map(function(cell) {
        return {
            row: cell.row,
            text: cell.element.textContent
        };
    });
    
    // Синхронизируем стор с текущим состоянием строк
    // Это обеспечит перемещение ID вслед за текстом при изменении порядка строк
    lineIdStore.syncRows(rowsData);
    
    var getData = function(cell) {
        var content = cell.element.textContent;
        // Получаем ID для этого row (после синхронизации он уже актуален)
        var storedId = lineIdStore.getIdForRowOnly(cell.row);
        return {row: cell.row, id: storedId, cont: content};
    }
    var cells       = lines.cells.map(getData);
    var cache       = lines.cellCache.map(function(item) {
        var content = item.element.textContent;
        return {row: item.row, id: item.id, cont: content};
    })

    // отображение
    var _ids                = document.getElementById('ids')
    var _cells              = document.getElementById('cells')
    var _cellCache          = document.getElementById('cellCache')
    _ids.innerHTML          = cells.map(function(c) { return '<div>id=' + c.id + ' row=' + c.row + ' "' + c.cont + '"</div>'; }).join('');
    _cells.innerHTML        = JSON.stringify(cells, null, 2)
    _cellCache.innerHTML    = JSON.stringify(cache, null, 2)

}

// обновлять при изменении
editor.on('change', updateids);
// обновить после рендера
editor.renderer.on("afterRender", updateids);

// начальное обновление после первой отрисовки
setTimeout(updateids, 100);
</script>
</body>
</html>
