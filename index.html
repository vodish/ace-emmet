<!DOCTYPE html>
<html>
<head>
<title>ACE in Action</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style type="text/css" media="screen">
    #editor { 
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        left: 0;
    }
</style>
</head>
<body>

<div id="editor"></div>
    
<script src="/i/ace/ace.js"></script>
<script src="/i/ace/mode-html.js"></script>
<script src="/i/ace/mode-yaml.js"></script>
<script src="/i/ace/ext-emmet.js"></script>
<script src="/i/ace/emmet.js"></script>
<script>
    var editor = ace.edit("editor");
    editor.session.setMode("ace/mode/html");
</script>
</body>
</html>
