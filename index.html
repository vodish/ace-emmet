<!DOCTYPE html>
<html>
<head>
<title>ACE Content Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style type="text/css" media="screen">
    .flex {
      height: 30vh;
      margin-top: 1em;
      display: flex;
    }
    .flex #edt {
        width: 50%;
    }
    .flex #ids {
        width: 50%;
        border: solid 1px red;
        overflow: auto;
        font-family: monospace;
        font-size: 10px;
    }
    #ids div {
        border-bottom: 1px dotted #ccc;
        padding: 2px 4px;
        position: relative;
    }
    
    .debug {
        font-family: monospace;
        font-size: 8px;
        gap: 2rem;
    }
    .controls {
        margin: 10px;
        padding: 10px;
        border: 1px solid #ccc;
    }
</style>
</head>
<body>


<div class="flex">
    <div id="edt"></div>
    <div id="ids"></div>
</div>

<div class="flex debug">
    <div>
        <div>cells</div>
        <pre id="cells"></pre>
    </div>
    <div>
        <div>cellCache</div>
        <pre id="cellCache"></pre>
    </div>
</div>

    
<script src="i/ace/ace.js"></script>
<script src="i/ace/mode-html.js"></script>
<script src="i/ace/mode-yaml.js"></script>
<script src="i/ace/emmet-cut.js?13"></script>
<script src="i/ace/ext-emmet.js?13"></script>
<script>
// Стор для управления уникальными ID строк
var LineIdStore = (function() {
    function LineIdStore() {
        this.textToId = new Map();      // текст -> id
        this.idToText = new Map();      // id -> текст
        this.rowToId = new Map();       // row -> id
        this.nextId = 0;                // следующий доступный ID
    }
    
    // Получить или создать ID для текста
    LineIdStore.prototype.getIdForText = function(text) {
        if (this.textToId.has(text)) {
            return this.textToId.get(text);
        }
        var newId = this.nextId++;
        this.textToId.set(text, newId);
        this.idToText.set(newId, text);
        return newId;
    };
    
    // Обновить привязку row -> id
    LineIdStore.prototype.updateRowMapping = function(row, text) {
        var id = this.getIdForText(text);
        this.rowToId.set(row, id);
        return id;
    };
    
    // Получить ID для row
    LineIdStore.prototype.getIdForRow = function(row) {
        return this.rowToId.get(row);
    };
    
    // Очистить маппинг row (при удалении строк)
    LineIdStore.prototype.clearRowMapping = function(row) {
        this.rowToId.delete(row);
    };
    
    // Сбросить все данные
    LineIdStore.prototype.reset = function() {
        this.textToId.clear();
        this.idToText.clear();
        this.rowToId.clear();
        this.nextId = 0;
    };
    
    return LineIdStore;
})();

var editor = ace.edit("edt");
editor.session.setOption("useWorker", false);
editor.session.setMode("ace/mode/html");
editor.setValue('one\ntwo\n');

// Инициализируем стор
var lineIdStore = new LineIdStore();

function updateids() {
    // источник
    var lines = editor.renderer.$textLayer.$lines;
    console.log('cells:', lines.cells);
    
    var getData = ({row, element, id}) => {
        var content = element.textContent;
        // Получаем или регистрируем ID для этого текста
        var storedId = lineIdStore.updateRowMapping(row, content);
        return {row, id: storedId, cont: content};
    }
    var cells       = lines.cells.map(getData)
    var cache       = lines.cellCache.map(({row, element, id}) => {
        var content = element.textContent;
        return {row, id, cont: content};
    })

    // отображение
    var _ids                = document.getElementById('ids')
    var _cells              = document.getElementById('cells')
    var _cellCache          = document.getElementById('cellCache')
    _ids.innerHTML          = cells.map(c => `<div>id=${c.id} row=${c.row} "${c.cont}"</div>`).join('');
    _cells.innerHTML        = JSON.stringify(cells, null, 2)
    _cellCache.innerHTML    = JSON.stringify(cache, null, 2)

}

// обновлять при изменении
editor.on('change', updateids);
// обновить после рендера
editor.renderer.on("afterRender", updateids);


// initial update
// updateids();
</script>
</body>
</html>
