<!DOCTYPE html>
<html>
<head>
<title>ACE Content Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style type="text/css" media="screen">
    .flex {
      height: 30vh;
      margin-top: 1em;
      display: flex;
    }
    .flex #edt {
        width: 50%;
    }
    .flex #ids {
        width: 50%;
        border: solid 1px red;
        overflow: auto;
        font-family: monospace;
        font-size: 10px;
    }
    #ids div {
        border-bottom: 1px dotted #ccc;
        padding: 2px 4px;
        position: relative;
    }
    
    .debug {
        font-family: monospace;
        font-size: 8px;
        gap: 2rem;
    }
    .controls {
        margin: 10px;
        padding: 10px;
        border: 1px solid #ccc;
    }
</style>
</head>
<body>


<div class="flex">
    <div id="edt"></div>
    <div id="ids"></div>
</div>

<div class="flex debug">
    <div>
        <div>cells</div>
        <pre id="cells"></pre>
    </div>
    <div>
        <div>cellCache</div>
        <pre id="cellCache"></pre>
    </div>
</div>

    
<script src="i/ace/ace.js"></script>
<script src="i/ace/mode-html.js"></script>
<script src="i/ace/mode-yaml.js"></script>
<script src="i/ace/emmet-cut.js?13"></script>
<script src="i/ace/ext-emmet.js?13"></script>
<script>
// ============================================
// ID Store - tracks unique IDs for text lines
// ============================================
var LineIdStore = (function() {
    // Map: textContent -> id
    var textToId = Object.create(null);
    // Map: id -> textContent (for reverse lookup)
    var idToText = Object.create(null);
    // Counter for generating new unique IDs
    var nextId = 0;
    
    return {
        // Get or create ID for given text content
        getId: function(text) {
            if (textToId[text] !== undefined) {
                return textToId[text];
            }
            // New text, assign new unique ID
            var newId = nextId++;
            textToId[text] = newId;
            idToText[newId] = text;
            return newId;
        },
        
        // Get text content by ID
        getText: function(id) {
            return idToText[id];
        },
        
        // Reset store (for debugging)
        reset: function() {
            textToId = Object.create(null);
            idToText = Object.create(null);
            nextId = 0;
        },
        
        // Get current state for debugging
        getState: function() {
            return {
                textToId: textToId,
                idToText: idToText,
                nextId: nextId
            };
        }
    };
})();

var editor = ace.edit("edt");
editor.session.setOption("useWorker", false);
editor.session.setMode("ace/mode/html");
editor.setValue('one\ntwo\n');

function updateids() {
    // источник
    var lines = editor.renderer.$textLayer.$lines;
    console.log('cells:', lines.cells);
    
    var getData = function(cell) {
        var content = cell.element.textContent;
        // Get or assign ID based on text content
        var id = LineIdStore.getId(content);
        return {row: cell.row, id: id, cont: content};
    }
    var cells = lines.cells.map(getData)
    var cache = lines.cellCache.map(function(c) {
        var content = c.element.textContent;
        var id = LineIdStore.getId(content);
        return {row: c.row, id: id, cont: content};
    })

    // отображение
    var _ids                = document.getElementById('ids')
    var _cells              = document.getElementById('cells')
    var _cellCache          = document.getElementById('cellCache')
    _ids.innerHTML          = cells.map(function(c) { 
        return '<div>id=' + c.id + ' row=' + c.row + ' "' + c.cont + '"</div>';
    }).join('');
    _cells.innerHTML        = JSON.stringify(cells, null, 2)
    _cellCache.innerHTML    = JSON.stringify(cache, null, 2)

}

// обновлять при изменении
editor.on('change', updateids);
// обновить после рендера
editor.renderer.on("afterRender", updateids);


// initial update
updateids();
</script>
</body>
</html>
