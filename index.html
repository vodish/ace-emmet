<!DOCTYPE html>
<html>
<head>
<title>ACE in Action</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style type="text/css" media="screen">
    .flex {
      height: 30vh;
      margin-top: 1em;
      display: flex;
    }
    .flex #edt {
        width: 50%;
    }
    .flex #ids {
        width: 50%;
        border: solid 1px red;
        overflow: auto;
        font-family: monospace;
        font-size: 10px;
    }
    #ids div {
        border-bottom: 1px dotted #ccc;
        padding: 2px 4px;
        position: relative;
    }
    
    .debug {
        font-family: monospace;
        font-size: 8px;
        gap: 2rem;
    }
    .controls {
        margin: 10px;
        padding: 10px;
        border: 1px solid #ccc;
    }
</style>
</head>
<body>

<div class="controls">
    <button onclick="moveLineDown()">Move line down (Alt+Down)</button>
    <button onclick="moveLineUp()">Move line up (Alt+Up)</button>
    <button onclick="logCells()">Log cells</button>
    <button onclick="addEmptyLine()">Add empty line</button>
</div>

<div class="flex">
    <div id="edt"></div>
    <div id="ids"></div>
</div>

<div class="flex debug">
    <div>
        <div>cells</div>
        <pre id="cells"></pre>
    </div>
    <div>
        <div>cellCache</div>
        <pre id="cellCache"></pre>
    </div>
</div>

    
<script src="i/ace/ace.js"></script>
<script src="i/ace/mode-html.js"></script>
<script src="i/ace/mode-yaml.js"></script>
<script src="i/ace/emmet-cut.js?13"></script>
<script src="i/ace/ext-emmet.js?13"></script>
<script>
var editor = ace.edit("edt");
editor.session.setOption("useWorker", false);
editor.session.setMode("ace/mode/html");
editor.setValue('one\ntwo\n');

function updateids() {
    // источник
    var lines = editor.renderer.$textLayer.$lines;
    console.log('cells:', lines.cells);
    
    var getData     = ({row, element, id}) => {
        var content = element.textContent;
        return {row, id, cont: content};
    }
    var cells       = lines.cells.map(getData)
    var cache       = lines.cellCache.map(({row, element, id}) => {
        var content = element.textContent;
        return {row, id, cont: content};
    })

    // отображение
    var _ids                = document.getElementById('ids')
    var _cells              = document.getElementById('cells')
    var _cellCache          = document.getElementById('cellCache')
    _ids.innerHTML          = cells.map(c => `<div>id=${c.id} row=${c.row} "${c.cont}"</div>`).join('');
    _cells.innerHTML        = JSON.stringify(cells, null, 2)
    _cellCache.innerHTML    = JSON.stringify(cache, null, 2)

}

// обновлять при изменении
// editor.on('change', updateids);
// обновить после рендера
editor.renderer.on("afterRender", updateids);



// отладочная байда аяя
function moveLineDown() {
    editor.execCommand('movelinedown');
}
function moveLineUp() {
    editor.execCommand('movelineup');
}
function logCells() {
    var lines = editor.renderer.$textLayer.$lines;
    console.log('Cells:', lines.cells.map(c => ({id: c.id, row: c.row, text: c.element.textContent})));
    console.log('Cell cache:', lines.cellCache.map(c => ({id: c.id, row: c.row})));
    console.log('contentToId map size:', lines.contentToId?.size);
    console.log('nextCellId:', lines.nextCellId);
}

function addEmptyLine() {
    editor.insert('\n');
}

// initial update
// updateids();
</script>
</body>
</html>
