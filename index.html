<!DOCTYPE html>
<html>
<head>
<title>ACE in Action</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style type="text/css" media="screen">
    .flex {
      height: 90vh;
      margin-top: 1em;
      display: flex;
    }
    .flex #edt {
        width: 50%;
    }
    .flex #raw {
        width: 50%;
        border: solid 1px red;
        overflow: auto;
        font-family: monospace;
        white-space: pre;
        background: #f9f9f9;
    }
    #raw div {
        border-bottom: 1px dotted #ccc;
        padding: 2px 4px;
        position: relative;
    }
    
    
    /* .ace_invisible {
        display: none !important;
    } */
</style>
</head>
<body>

<div class="flex">
    <div id="edt"></div>
    <div id="raw"></div>
</div>
    
<script src="i/ace/ace.js"></script>
<script src="i/ace/mode-html.js"></script>
<script src="i/ace/mode-yaml.js"></script>
<script src="i/ace/emmet-cut.js?13"></script>
<script src="i/ace/ext-emmet.js?13"></script>
<script>
    var editor = ace.edit("edt");
    editor.session.setOption("useWorker", false);
    editor.session.setMode("ace/mode/html");
    editor.setValue('id линии\nid линии\nid линии\nid линии\n');
    
</script>
</body>
</html>
