<!DOCTYPE html>
<html>
<head>
<title>ACE in Action</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style type="text/css" media="screen">
    .flex {
      height: 90vh;
      margin-top: 1em;
      display: flex;
    }
    .flex #edt {
        width: 70%;
    }
    .flex #raw {
        width: 30%;
        border: solid 1px red;
        overflow: auto;
        font-family: monospace;
        white-space: pre;
        background: #f9f9f9;
    }
    #raw div {
        border-bottom: 1px dotted #ccc;
        padding: 2px 4px;
        position: relative;
    }
    
    
    /* .ace_invisible {
        display: none !important;
    } */
</style>
</head>
<body>

<div class="flex">
    <div id="edt"></div>
    <div id="raw"></div>
</div>
    
<script src="i/ace/ace.js"></script>
<script src="i/ace/mode-html.js"></script>
<script src="i/ace/mode-yaml.js"></script>
<script src="i/ace/emmet-cut.js?13"></script>
<script src="i/ace/ext-emmet.js?13"></script>
<script>
var editor = ace.edit("edt");
editor.session.setOption("useWorker", false);
editor.session.setMode("ace/mode/html");
editor.setValue('id линии\nid линии\nid линии\nid линии\n');

function updateRaw() {
    var raw = document.getElementById('raw');
    if (!raw) return;
    var textLayer = editor.renderer.$textLayer;
    if (!textLayer) return;
    var lines = textLayer.$lines;
    if (!lines || !lines.cells) return;
    var cells = lines.cells;
    var html = '';
    for (var i = 0; i < cells.length; i++) {
        var cell = cells[i];
        html += '<div>' + i + ' = ' + (cell.id || '?') + '</div>';
    }
    raw.innerHTML = html;
}
// обновлять при изменении
editor.on('change', updateRaw);
</script>
</body>
</html>
